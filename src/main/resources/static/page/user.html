<!doctype html>
<html lang="en" xmlns="http://www.w3.org/1999/html">
<head>
      <meta http-equiv="Content-Type" content="text/html; charset=utf-8"/>
      <title>Personal Fitness Application | User</title>
      <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes"/>
      <meta name="color-scheme" content="light dark"/>
      <meta name="theme-color" content="#007bff" media="(prefers-color-scheme: light)"/>
      <meta name="theme-color" content="#1a1a1a" media="(prefers-color-scheme: dark)"/>
      <meta name="title" content="Personal Fitness Application | User"/>
      <meta name="supported-color-schemes" content="light dark"/>

      <link rel="preload" href="../css/adminlte.css" as="style"/>
      <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/source-sans-3@5.0.12/index.css"
            integrity="sha256-tXJfXfp6Ewt1ilPzLDtQnJV4hclT9XuaZUKyUvmyr+Q=" crossorigin="anonymous" media="print"/>
      <link rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/overlayscrollbars@2.11.0/styles/overlayscrollbars.min.css"
            crossorigin="anonymous"/>
      <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
            crossorigin="anonymous"/>
      <link rel="stylesheet" href="../css/adminlte.css"/>
      <link rel="stylesheet" href="../css/style.css"/>

</head>

<body class="layout-fixed sidebar-expand-lg bg-body-tertiary" style="opacity: 0; transition: opacity 0.3s ease-in-out;">

<div class="app-wrapper">
      <div id="header-container"></div>
      <div id="sidebar-container"></div>
      <div id="toast-container-placeholder"></div>

      <main class="app-main">
            <div class="app-content-header">
                  <div class="container-fluid">
                        <div class="card mb-4 shadow-sm" id="user-list-card" style="border-radius: 12px;">

                              <!-- Header -->
                              <div class="card-header d-flex align-items-center"
                                   style="background: linear-gradient(90deg,#4e73df,#224abe); color: white; border-radius: 12px 12px 0 0;">

                                    <h3 class="card-title mb-0 fw-bold">User</h3>

                                    <div class="card-tools d-flex align-items-center gap-2 ms-auto">

                                          <!-- Search Box -->
                                          <div class="input-group input-group-sm" style="width: 200px;">
                                                <input type="text"
                                                        id="table-search"
                                                        class="form-control shadow-none"
                                                        placeholder="Search user..."
                                                        style="border-radius: 20px;">
                                          </div>

                                          <!-- Refresh Button -->
                                          <button type="button"
                                                  class="btn btn-outline-light btn-sm shadow-sm"
                                                  onclick="loadUsers()"
                                                  style="border-radius: 20px;">
                                                <i class="bi bi-arrow-clockwise"></i>
                                          </button>

                                          <!-- Add Button -->
                                          <button type="button"
                                                  class="btn btn-success btn-sm px-3 shadow-sm"
                                                  style="border-radius: 20px; font-weight: 500;"
                                                  onclick="showForm(true)">
                                                <i class="bi bi-person-plus-fill me-1"></i>
                                                Add User
                                          </button>

                                    </div>
                              </div>

                              <!-- Table -->
                              <div class="card-body p-0">
                                    <table class="table table-hover align-middle mb-0">
                                          <thead style="background-color:#f8f9fc;">
                                          <tr>
                                                <th>Name</th>
                                                <th>Username</th>
                                                <th>Contact No</th>
                                                <th>Email</th>
                                                <th>Role</th>
                                                <th>Status</th>
                                                <th class="text-center">Action</th>
                                          </tr>
                                          </thead>
                                          <tbody id="user-table-body"></tbody>
                                    </table>
                              </div>

                              <div class="card-footer bg-white border-0 py-3">
                                    <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">

                                          <!-- Page Info -->
                                          <small class="text-muted fw-semibold">
                                                Page <span id="page-info"></span>
                                          </small>

                                          <!-- Pagination -->
                                          <nav>
                                                <ul class="pagination pagination-sm mb-0" id="pagination"></ul>
                                          </nav>

                                    </div>
                              </div>
                        </div>

                        <div class="card mb-4" id="unauthorized-message-card" style="display: none;">
                            <div class="card-header">
                                <h3 class="card-title text-danger">Access Denied</h3>
                            </div>
                            <div class="card-body">
                                <p>You do not have permission to view this page.</p>
                            </div>
                        </div>

                        <div class="card mb-4" id="user-form-card" style="display: none;border-radius: 12px;">
                              <div class="card-header" style="background: linear-gradient(90deg,#4e73df,#224abe);color: white; border-radius: 12px 12px 0 0">
                                    <h3 class="card-title" id="form-title">User Details</h3>
                                    <div class="card-tools">
                                          <button type="button" class="btn btn-tool" onclick="showList()">
                                                <i class="bi bi-x-lg"></i>
                                          </button>
                                    </div>
                              </div>
                              <div class="card-body">
                                    <form id="user-form">
                                          <input type="hidden" id="userId">
                                          <div class="row">
                                                <div class="col-md-6 mb-3">
                                                      <label for="name" class="form-label">Name <span class="text-danger">*</span></label>
                                                      <input type="text" class="form-control" id="name">
                                                </div>
                                                <div class="col-md-6 mb-3">
                                                      <label for="username" class="form-label">Username <span class="text-danger">*</span></label>
                                                      <input type="text" class="form-control" id="username">
                                                </div>
                                          </div>
                                          <div class="row">
                                                <div class="col-md-6 mb-3">
                                                      <label for="password" class="form-label">Password <span class="text-danger">*</span></label>
                                                      <input type="password" class="form-control" id="password">
                                                </div>
                                                <div class="col-md-6 mb-3">
                                                      <label for="contactNo" class="form-label">Contact No <span class="text-danger">*</span></label>
                                                      <input type="number" class="form-control" id="contactNo" pattern="[6-9]{1}[0-9]{9}"
                                                             maxlength="10" placeholder="Enter 10 digit mobile">
                                                </div>
                                          </div>
                                          <div class="row">
                                                <div class="col-md-6 mb-3">
                                                      <label for="email" class="form-label">Email <span class="text-danger">*</span></label>
                                                      <input type="email" class="form-control" id="email">
                                                </div>
                                                <div class="col-md-6 mb-3">
                                                      <label for="dateOfBirth" class="form-label">Date of Birth <span class="text-danger">*</span></label>
                                                      <input type="date" class="form-control" id="dateOfBirth">
                                                </div>
                                          </div>
                                          <div class="row">
                                                <div class="col-md-6 mb-3">
                                                      <label for="gender" class="form-label">Gender <span class="text-danger">*</span></label>
                                                      <select class="form-select" id="gender">
                                                            <option value="MALE">MALE</option>
                                                            <option value="FEMALE">FEMALE</option>
                                                      </select>
                                                </div>
                                                <div class="col-md-6 mb-3">
                                                      <label for="height" class="form-label">Height</label>
                                                      <div class="input-group">
                                                            <input type="number" step="0.01" class="form-control"
                                                                   id="height">
                                                            <select class="form-select" id="heightUomId"
                                                                    style="max-width: 150px;"></select>
                                                            <input type="text" class="form-control" id="heightUomValue"
                                                                   readonly style="display: none; max-width: 100px;">
                                                      </div>
                                                </div>
                                          </div>
                                          <div class="row">
                                                <div class="col-md-6 mb-3">
                                                      <label for="weight" class="form-label">Weight</label>
                                                      <div class="input-group">
                                                            <input type="number" step="0.01" class="form-control"
                                                                   id="weight">
                                                            <select class="form-select" id="weightUomId"
                                                                    style="max-width: 150px;"></select>
                                                            <input type="text" class="form-control" id="weightUomValue"
                                                                   readonly style="display: none; max-width: 100px;">
                                                      </div>
                                                </div>
                                                <div class="col-md-6 mb-3">
                                                      <label for="status" class="form-label">Status</label>
                                                      <select class="form-select" id="status">
                                                            <option value="ACTIVE">ACTIVE</option>
                                                            <option value="INACTIVE">INACTIVE</option>
                                                      </select>
                                                </div>
                                          </div>
                                          <div class="row">
                                                <div class="col-md-6 mb-3" id="form-group-role">
                                                      <label for="role" class="form-label">Role</label>
                                                      <select class="form-select" id="role">
                                                            <option value="ADMIN">ADMIN</option>
                                                            <option value="USER">USER</option>
                                                      </select>
                                                </div>
                                          </div>
                                          <div class="d-flex justify-content-end gap-2">
                                                <button type="button" class="btn btn-outline-secondary px-4 rounded-pill"
                                                        onclick="showList()"><i class="bi bi-x-circle me-1"></i>Cancel
                                                </button>
                                                <button type="submit" class="btn btn-primary px-4 rounded-pill shadow-sm"
                                                        id="save-btn" disabled><i class="bi bi-check-circle me-1"></i>Save
                                                </button>
                                          </div>
                                    </form>
                              </div>
                        </div>
                  </div>

            </div>
      </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/storage.js"></script>
<script src="../js/common.js"></script>
<script src="../js/api.js"></script>
<script src="../js/user.js"></script>
</body>
</html>
