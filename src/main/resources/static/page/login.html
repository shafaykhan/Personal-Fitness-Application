<!DOCTYPE html>
<html lang="en">

<head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Personal Fitness Application | Login</title>
      <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
      <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

      <style>
            body {
                  margin: 0;
                  height: 100vh;
                  position: relative;
                  overflow: hidden;
            }

            body::before {
                  content: "";
                  position: fixed;
                  inset: 0;
                  background: url('../img/fitness-app-login.jpg') no-repeat center center/cover;
                  filter: blur(6px);
                  transform: scale(1.1); /* Prevent white edges after blur */
                  z-index: -1;
            }
            .modal-content {
                  backdrop-filter: blur(12px);
                  -webkit-backdrop-filter: blur(12px);
            }
      </style>
</head>

<!--<body class="bg-light" style="background: linear-gradient(135deg,#4e73df,#224abe);">-->
<body class="bg-light">
<div id="toast-container-placeholder"></div>
<div class="container vh-100 d-flex justify-content-center align-items-center">

      <div class="card shadow-lg border-0 p-4" style="width: 380px; border-radius: 15px;background: rgba(255,255,255,0.2)">

            <!-- Title -->
            <div class="text-center mb-4">
                  <h4 class="fw-bold">Personal Fitness Application</h4>
                  <h5 class="fw-bold">Login</h5>
            </div>

            <form id="loginForm">

                  <!-- Username -->
                  <div class="mb-3">
                        <label for="username" class="form-label fw-semibold">Username</label>
                        <div class="input-group">
                    <span class="input-group-text bg-light">
                        <i class="bi bi-person"></i>
                    </span>
                              <input type="text"
                                     class="form-control"
                                     id="username"
                                     placeholder="Enter username">
                        </div>
                  </div>

                  <!-- Password -->
                  <div class="mb-3">
                        <label for="password" class="form-label fw-semibold">Password</label>
                        <div class="input-group">
                    <span class="input-group-text bg-light">
                        <i class="bi bi-lock"></i>
                    </span>
                              <input type="password"
                                     class="form-control"
                                     id="password"
                                     placeholder="Enter password">
                              <span class="input-group-text bg-light" id="togglePassword" style="cursor: pointer;">
                                    <i class="bi bi-eye-slash" id="toggleIcon"></i>
                              </span>
                        </div>
                  </div>

                  <!-- Login Button -->
                  <button type="submit"
                          id="loginButton"
                          class="btn btn-primary w-100 rounded-pill mt-2 shadow-sm" disabled>
                        Login
                  </button>

                  <!-- Register Button -->
                  <button type="button"
                          class="btn btn-outline-secondary w-100 rounded-pill mt-2 shadow-sm"
                          data-bs-toggle="modal" data-bs-target="#registerModal">
                        Create an account
                  </button>

                  <!-- Error -->
                  <p class="text-danger mt-3 text-center small" id="error"></p>

            </form>
      </div>
</div>

<!-- Register Modal -->
<div class="modal fade" id="registerModal" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg"
                 style="border-radius:15px; background: rgba(255,255,255,0.2); backdrop-filter: blur(10px);">

                  <!-- Header -->
                  <div class="modal-header border-0">
                        <h5 class="modal-title fw-bold">Create Account</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                  </div>

                  <!-- Scrollable Body -->
                  <div class="modal-body px-4" style="max-height: 65vh; overflow-y: auto;">

                        <form id="registerForm">

                              <!-- Name -->
                              <div class="mb-3">
                                    <label class="form-label fw-semibold">Name</label>
                                    <div class="input-group">
                            <span class="input-group-text bg-light">
                                <i class="bi bi-person"></i>
                            </span>
                                          <input type="text" class="form-control" id="regName"
                                                 placeholder="Enter full name" required>
                                    </div>
                              </div>

                              <!-- Username -->
                              <div class="mb-3">
                                    <label class="form-label fw-semibold">Username</label>
                                    <div class="input-group">
                            <span class="input-group-text bg-light">
                                <i class="bi bi-at"></i>
                            </span>
                                          <input type="text" class="form-control" id="regUsername"
                                                 placeholder="Choose username" required>
                                    </div>
                              </div>

                              <!-- Password -->
                              <div class="mb-3">
                                    <label class="form-label fw-semibold">Password</label>
                                    <div class="input-group">
                            <span class="input-group-text bg-light">
                                <i class="bi bi-lock"></i>
                            </span>
                                          <input type="password" class="form-control" id="regPassword"
                                                 placeholder="Create password" required>
                                    </div>
                              </div>

                              <!-- Email -->
                              <div class="mb-3">
                                    <label class="form-label fw-semibold">Email</label>
                                    <div class="input-group">
                            <span class="input-group-text bg-light">
                                <i class="bi bi-envelope"></i>
                            </span>
                                          <input type="email" class="form-control" id="regEmail"
                                                 placeholder="Enter email" required>
                                    </div>
                              </div>

                              <!-- Contact -->
                              <div class="mb-3">
                                    <label class="form-label fw-semibold">Contact No</label>
                                    <div class="input-group">
                            <span class="input-group-text bg-light">
                                <i class="bi bi-telephone"></i>
                            </span>
                                          <input type="number" class="form-control" id="regContactNo"
                                                 pattern="[6-9]{1}[0-9]{9}"
                                                 maxlength="10" placeholder="Enter 10 digit mobile" required>
                                    </div>
                              </div>

                              <!-- DOB + Gender Row -->
                              <div class="row">
                                    <div class="col-md-6 mb-3">
                                          <label class="form-label fw-semibold">Date of Birth</label>
                                          <input type="date" class="form-control" id="regDateOfBirth" required>
                                    </div>

                                    <div class="col-md-6 mb-3">
                                          <label class="form-label fw-semibold">Gender</label>
                                          <select class="form-select" id="regGender" required>
                                                <option value="" disabled selected>Select</option>
                                                <option value="MALE">Male</option>
                                                <option value="FEMALE">Female</option>
                                          </select>
                                    </div>
                              </div>

                              <!-- Buttons -->
                              <div class="d-flex justify-content-end gap-2 mt-3">
                                    <button type="button"
                                            class="btn btn-outline-secondary rounded-pill px-4"
                                            data-bs-dismiss="modal">
                                          Cancel
                                    </button>

                                    <button type="submit"
                                            class="btn btn-primary rounded-pill px-4 shadow-sm"
                                            id="registerBtn" disabled>
                                          Register
                                    </button>
                              </div>

                        </form>

                  </div>
            </div>
      </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/storage.js"></script>
<script src="../js/common.js"></script>
<script src="../js/auth.js"></script>

</body>

</html>
