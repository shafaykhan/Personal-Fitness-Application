<!DOCTYPE html>
<html lang="en">

<head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Personal Fitness Application | Login</title>
      <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

      <style>
            body {
                  margin: 0;
                  height: 100vh;
                  position: relative;
                  overflow: hidden;
            }

            body::before {
                  content: "";
                  position: fixed;
                  inset: 0;
                  background: url('../img/fitness-app-login.jpg') no-repeat center center/cover;
                  filter: blur(6px);
                  transform: scale(1.1); /* Prevent white edges after blur */
                  z-index: -1;
            }
      </style>
</head>

<!--<body class="bg-light" style="background: linear-gradient(135deg,#4e73df,#224abe);">-->
<body class="bg-light">
<div id="toast-container-placeholder"></div>
<div class="container vh-100 d-flex justify-content-center align-items-center">

      <div class="card shadow-lg border-0 p-4" style="width: 380px; border-radius: 15px;background: rgba(255,255,255,0.2)">

            <!-- Title -->
            <div class="text-center mb-4">
                  <h4 class="fw-bold">Personal Fitness Application</h4>
                  <h5 class="fw-bold">Login</h5>
            </div>

            <form id="loginForm">

                  <!-- Username -->
                  <div class="mb-3">
                        <label for="username" class="form-label fw-semibold">Username</label>
                        <div class="input-group">
                    <span class="input-group-text bg-light">
                        <i class="bi bi-person"></i>
                    </span>
                              <input type="text"
                                     class="form-control"
                                     id="username"
                                     placeholder="Enter username"
                                     required>
                        </div>
                  </div>

                  <!-- Password -->
                  <div class="mb-3">
                        <label for="password" class="form-label fw-semibold">Password</label>
                        <div class="input-group">
                    <span class="input-group-text bg-light">
                        <i class="bi bi-lock"></i>
                    </span>
                              <input type="password"
                                     class="form-control"
                                     id="password"
                                     placeholder="Enter password"
                                     required>
                        </div>
                  </div>

                  <!-- Login Button -->
                  <button type="submit"
                          class="btn btn-primary w-100 rounded-pill mt-2 shadow-sm">
                        Login
                  </button>

                  <!-- Error -->
                  <p class="text-danger mt-3 text-center small" id="error"></p>

            </form>
      </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/storage.js"></script>
<script src="../js/common.js"></script>
<script src="../js/auth.js"></script>

</body>

</html>
