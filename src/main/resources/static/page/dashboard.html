<!doctype html>
<html lang="en">
<head>
      <meta http-equiv="Content-Type" content="text/html; charset=utf-8"/>
      <title>Personal Fitness Application | Dashboard</title>
      <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes"/>
      <meta name="color-scheme" content="light dark"/>
      <meta name="theme-color" content="#007bff" media="(prefers-color-scheme: light)"/>
      <meta name="theme-color" content="#1a1a1a" media="(prefers-color-scheme: dark)"/>
      <meta name="title" content="Personal Fitness Application | Dashboard"/>
      <meta name="supported-color-schemes" content="light dark"/>

      <link rel="preload" href="../css/adminlte.css" as="style"/>
      <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/source-sans-3@5.0.12/index.css"
              integrity="sha256-tXJfXfp6Ewt1ilPzLDtQnJV4hclT9XuaZUKyUvmyr+Q=" crossorigin="anonymous" media="print"/>
      <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/overlayscrollbars@2.11.0/styles/overlayscrollbars.min.css"
            crossorigin="anonymous"/>
      <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
            crossorigin="anonymous"/>
      <link rel="stylesheet" href="../css/adminlte.css"/>

</head>

<body class="layout-fixed sidebar-expand-lg bg-body-tertiary" style="opacity: 0; transition: opacity 0.3s ease-in-out;">
<div id="toast-container-placeholder"></div>
<div class="app-wrapper">
      <div id="header-container"></div>
      <div id="sidebar-container"></div>

      <main class="app-main">
            <div class="app-content-header">
                  <div class="container-fluid">
                        <div class="row">
                              <div class="col-sm-6">
                                    <h3 class="mb-0">Dashboard</h3>
                              </div>
                        </div>
                  </div>

            </div>

            <div class="app-content">
                  <div class="container-fluid">
                        <div class="row">
                              <div class="col-lg-6">
                                    <div class="card mb-4">
                                          <div class="card-header border-0">
                                                <h3 class="card-title"><i class="bi bi-activity me-2 text-primary"></i>Recent Workouts</h3>
                                                <div class="card-tools">
                                                      <a href="workout.html" class="btn btn-tool btn-sm"> <i class="bi bi-list"></i> </a>
                                                </div>
                                          </div>
                                          <div class="card-body p-0">
                                                <table class="table table-striped">
                                                      <thead>
                                                      <tr>
                                                            <th>Exercise</th>
                                                            <th>Type</th>
                                                            <th>Duration</th>
                                                            <th>Date</th>
                                                      </tr>
                                                      </thead>
                                                      <tbody id="workout-list">
                                                      </tbody>
                                                </table>
                                          </div>
                                    </div>
                              </div>
                              <div class="col-lg-6">
                                    <div class="card mb-4">
                                          <div class="card-header border-0">
                                                <h3 class="card-title"><i class="bi bi-heart-pulse me-2 text-danger"></i>Recent Health Records</h3>
                                                <div class="card-tools">
                                                      <a href="health_record.html" class="btn btn-tool btn-sm"> <i class="bi bi-list"></i> </a>
                                                </div>
                                          </div>
                                          <div class="card-body p-0">
                                                <table class="table table-striped">
                                                      <thead>
                                                      <tr>
                                                            <th>Weight</th>
                                                            <th>Sleep</th>
                                                            <th>Steps</th>
                                                            <th>Date</th>
                                                      </tr>
                                                      </thead>
                                                      <tbody id="health-list">
                                                      </tbody>
                                                </table>
                                          </div>
                                    </div>
                              </div>
                              <div class="col-lg-6">
                                    <div class="card mb-4">
                                          <div class="card-header border-0">
                                                <h3 class="card-title"><i class="bi bi-egg-fried me-2 text-warning"></i>Recent Diet Records</h3>
                                                <div class="card-tools">
                                                      <a href="diet_record.html" class="btn btn-tool btn-sm"> <i class="bi bi-list"></i> </a>
                                                </div>
                                          </div>
                                          <div class="card-body p-0">
                                                <table class="table table-striped">
                                                      <thead>
                                                      <tr>
                                                            <th>Food</th>
                                                            <th>Meal</th>
                                                            <th>Calories</th>
                                                            <th>Date</th>
                                                      </tr>
                                                      </thead>
                                                      <tbody id="diet-list">
                                                      </tbody>
                                                </table>
                                          </div>
                                    </div>
                              </div>
                              <div class="col-lg-6">
                                    <div class="card mb-4">
                                          <div class="card-header border-0">
                                                <h3 class="card-title"><i class="bi bi-trophy me-2 text-success"></i>Recent Goals</h3>
                                                <div class="card-tools">
                                                      <a href="goal.html" class="btn btn-tool btn-sm"> <i class="bi bi-list"></i> </a>
                                                </div>
                                          </div>
                                          <div class="card-body p-0">
                                                <table class="table table-striped">
                                                      <thead>
                                                      <tr>
                                                            <th>Goal</th>
                                                            <th>Target</th>
                                                            <th>Current</th>
                                                            <th>Status</th>
                                                      </tr>
                                                      </thead>
                                                      <tbody id="goal-list">
                                                      </tbody>
                                                </table>
                                          </div>
                                    </div>
                              </div>
                        </div>
                  </div>
            </div>
      </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/overlayscrollbars@2.11.0/browser/overlayscrollbars.browser.es6.min.js" crossorigin="anonymous">
</script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.min.js" crossorigin="anonymous"></script>
<script src="../js/storage.js"></script>
<script src="../js/api.js"></script>
<script src="../js/common.js"></script>
<script src="../js/dashboard.js"></script>
</body>
</html>
