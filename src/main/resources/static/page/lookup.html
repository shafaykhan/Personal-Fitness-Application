<!doctype html>
<html lang="en" xmlns="http://www.w3.org/1999/html">
<!--begin::Head-->
<head>
      <meta http-equiv="Content-Type" content="text/html; charset=utf-8"/>
      <title>Personal Fitness Application | Lookup</title>
      <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes"/>
      <meta name="color-scheme" content="light dark"/>
      <meta name="theme-color" content="#007bff" media="(prefers-color-scheme: light)"/>
      <meta name="theme-color" content="#1a1a1a" media="(prefers-color-scheme: dark)"/>
      <meta name="title" content="Personal Fitness Application | Lookup"/>
      <meta name="supported-color-schemes" content="light dark"/>
      <link rel="preload" href="../css/adminlte.css" as="style"/>
      <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/source-sans-3@5.0.12/index.css"
            integrity="sha256-tXJfXfp6Ewt1ilPzLDtQnJV4hclT9XuaZUKyUvmyr+Q=" crossorigin="anonymous" media="print"/>
      <link rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/overlayscrollbars@2.11.0/styles/overlayscrollbars.min.css"
            crossorigin="anonymous"/>
      <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
            crossorigin="anonymous"/>
      <link rel="stylesheet" href="../css/adminlte.css"/>

</head>

<body class="layout-fixed sidebar-expand-lg bg-body-tertiary" style="opacity: 0; transition: opacity 0.3s ease-in-out;">

<div class="app-wrapper">
      <div id="header-container"></div>
      <div id="sidebar-container"></div>

      <div id="toast-container-placeholder"></div>
      <main class="app-main">
            <div class="app-content-header">
                  <div class="container-fluid">
                        <div class="card mb-4" id="lookup-list-card">
                              <div class="card-header">
                                    <h3 class="card-title">Lookup List</h3>
                                    <div class="card-tools d-flex">
                                          <div class="input-group input-group-sm" style="width: 150px;">
                                                <input type="text" id="table-search" class="form-control float-right" placeholder="Search">
                                          </div>
                                          <div class="input-group-sm" style="width: auto;">
                                                <button type="button" class="btn btn-primary btn-sm" onclick="showForm(true)">
                                                      <i class="bi bi-plus"></i> Add
                                                </button>
                                          </div>
                                    </div>
                              </div>

                              <div class="card-body p-0">
                                    <table class="table table-striped">
                                          <thead>
                                          <tr>
                                                <th>Group Key</th>
                                                <th>Value</th>
                                                <th>Status</th>
                                                <th>Action</th>
                                          </tr>
                                          </thead>
                                          <tbody id="lookup-table-body">
                                          </tbody>
                                    </table>
                              </div>
                              <div class="card-footer clearfix">
                                    <ul class="pagination pagination-sm m-0 float-right" id="pagination">
                                    </ul>
                              </div>
                        </div>

                        <div class="card mb-4" id="unauthorized-message-card" style="display: none;">
                            <div class="card-header">
                                <h3 class="card-title text-danger">Access Denied</h3>
                            </div>
                            <div class="card-body">
                                <p>You do not have permission to view this page.</p>
                            </div>
                        </div>

                        <div class="card mb-4" id="lookup-form-card" style="display: none;">
                              <div class="card-header">
                                    <h3 class="card-title" id="form-title">Lookup Details</h3>
                                    <div class="card-tools">
                                          <button type="button" class="btn btn-tool" onclick="showList()">
                                                <i class="bi bi-x-lg"></i>
                                          </button>
                                    </div>
                              </div>
                              <div class="card-body">
                                    <form id="lookup-form">
                                          <input type="hidden" id="lookupId">
                                          <div class="row">
                                                <div class="col-md-6 mb-3">
                                                      <label for="groupKey" class="form-label">Group Key</label>
                                                      <input type="text" class="form-control" id="groupKey" required>
                                                </div>
                                                <div class="col-md-6 mb-3">
                                                      <label for="value" class="form-label">Value</label>
                                                      <input type="text" class="form-control" id="value" required>
                                                </div>
                                          </div>

                                          <div class="row">
                                                <div class="col-md-6 mb-3">
                                                      <label for="status" class="form-label">Status</label>
                                                      <select class="form-select" id="status">
                                                            <option value="ACTIVE">ACTIVE</option>
                                                            <option value="INACTIVE">INACTIVE</option>
                                                      </select>
                                                </div>
                                          </div>
                                          <div class="d-flex justify-content-end">
                                                <button type="button" class="btn btn-secondary me-2"
                                                        onclick="showList()">Cancel
                                                </button>
                                                <button type="submit" class="btn btn-primary" id="save-btn">Save
                                                </button>
                                          </div>
                                    </form>
                              </div>
                        </div>
                  </div>

            </div>

            <div class="app-content">
                  <div class="container-fluid">
                        <div class="row">
                        </div>
                  </div>
            </div>
      </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/overlayscrollbars@2.11.0/browser/overlayscrollbars.browser.es6.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/api.js"></script>
<script src="../js/storage.js"></script>
<script src="../js/common.js"></script>
<script src="../js/lookup.js"></script>
</body>
</html>
