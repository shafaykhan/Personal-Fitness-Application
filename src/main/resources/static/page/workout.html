<!doctype html>
<html lang="en">
<head>
      <meta http-equiv="Content-Type" content="text/html; charset=utf-8"/>
      <title>AdminLTE v4 | Workout</title>
      <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes"/>
      <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
            crossorigin="anonymous"/>
      <link rel="stylesheet" href="/fitness-app/css/adminlte.css"/>
      <link rel="stylesheet" href="/fitness-app/css/style.css"/>
</head>
<body class="layout-fixed sidebar-expand-lg bg-body-tertiary">
<div class="app-wrapper">
      <div id="header-container"></div>
      <div id="sidebar-container"></div>
      <div id="toast-container-placeholder"></div>
      <main class="app-main">
            <div class="app-content-header">
                  <div class="container-fluid">
                        <div class="card mb-4" id="workout-list-card">
                              <div class="card-header">
                                    <h3 class="card-title" style="font-weight: bold;">Workout</h3>
                                    <div class="card-tools d-flex">
                                          <div class="input-group input-group-sm" style="width: 150px;">
                                                <input type="text" id="table-search" class="form-control float-right"
                                                       placeholder="Search">
                                                <div class="input-group-append">
                                                      <button type="submit" class="btn btn-default"><i
                                                              class="bi bi-search"></i></button>
                                                </div>
                                          </div>
                                          <div class="input-group-sm" style="width: auto;">
                                                <button type="button" class="btn btn-primary btn-sm"
                                                        onclick="showForm(true)"><i class="bi bi-plus"></i> Add
                                                </button>
                                          </div>
                                    </div>
                              </div>
                              <div class="card-body p-0">
                                    <table class="table table-striped">
                                          <thead>
                                          <tr>
                                                <th>Exercise Name</th>
                                                <th>Type</th>
                                                <th>Duration</th>
                                                <th>Intensity</th>
                                                <th>Calories Burned</th>
                                                <th>Date</th>
                                                <th>Status</th>
                                                <th>Action</th>
                                          </tr>
                                          </thead>
                                          <tbody id="workout-table-body"></tbody>
                                    </table>
                              </div>
                              <div class="card-footer clearfix">
                                    <ul class="pagination pagination-sm m-0 float-right" id="pagination"></ul>
                              </div>
                        </div>


                        <div class="card mb-4" id="workout-form-card" style="display: none;">
                              <div class="card-header">
                                    <h3 class="card-title" id="form-title">Workout Details</h3>
                                    <div class="card-tools">
                                          <button type="button" class="btn btn-tool" onclick="showList()"><i
                                                  class="bi bi-x-lg"></i></button>
                                    </div>
                              </div>
                              <div class="card-body">
                                    <form id="workout-form">
                                          <input type="hidden" id="workoutId">
                                          <div class="row">
                                                <div class="col-md-6 mb-3">
                                                      <label for="exerciseName" class="form-label">Exercise Name</label>
                                                      <input type="text" class="form-control" id="exerciseName"
                                                             required>
                                                </div>
                                                <div class="col-md-6 mb-3">
                                                      <label for="typeId" class="form-label">Type</label>
                                                      <select class="form-select" id="typeId" required></select>
                                                </div>
                                          </div>
                                          <div class="row">
                                                <div class="col-md-6 mb-3">
                                                      <label for="duration" class="form-label">Duration</label>
                                                      <div class="input-group">
                                                            <input type="number" class="form-control" id="duration"
                                                                   required>
                                                            <select class="form-select" id="durationUomId"
                                                                    style="max-width: 100px;"></select>
                                                      </div>
                                                </div>
                                                <div class="col-md-6 mb-3">
                                                      <label for="intensityId" class="form-label">Intensity</label>
                                                      <select class="form-select" id="intensityId" required></select>
                                                </div>
                                          </div>
                                          <div class="row">
                                                <div class="col-md-6 mb-3">
                                                      <label for="caloriesBurned" class="form-label">Calories
                                                            Burned</label>
                                                      <input type="number" class="form-control" id="caloriesBurned">
                                                </div>
                                                <div class="col-md-6 mb-3">
                                                      <label for="recordDateTime" class="form-label">Date</label>
                                                      <input type="datetime-local" class="form-control"
                                                             id="recordDateTime" required>
                                                </div>
                                          </div>
                                          <div class="row">
                                                <div class="col-md-6 mb-3">
                                                      <label for="status" class="form-label">Status</label>
                                                      <select class="form-select" id="status" required>
                                                            <option value="ACTIVE">ACTIVE</option>
                                                            <option value="INACTIVE">INACTIVE</option>
                                                      </select>
                                                </div>
                                                <div class="col-md-6 mb-3">
                                                      <label for="notes" class="form-label">Notes</label>
                                                      <textarea class="form-control" id="notes" rows="3"></textarea>
                                                </div>
                                          </div>
                                          <div class="d-flex justify-content-end">
                                                <button type="button" class="btn btn-secondary me-2"
                                                        onclick="showList()">Cancel
                                                </button>
                                                <button type="submit" class="btn btn-primary" id="save-btn">Save
                                                </button>
                                          </div>
                                    </form>
                              </div>
                        </div>
                  </div>
            </div>
      </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/api.js"></script>
<script src="../js/storage.js"></script>
<script src="../js/common.js"></script>
<script src="../js/api.js"></script>
<script src="../js/workout.js"></script>
</body>
</html>
