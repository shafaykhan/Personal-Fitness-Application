<!doctype html>
<html lang="en" xmlns="http://www.w3.org/1999/html">
<head>
      <meta http-equiv="Content-Type" content="text/html; charset=utf-8"/>
      <title>Personal Fitness Application | Workout</title>
      <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes"/>
      <meta name="color-scheme" content="light dark"/>
      <meta name="theme-color" content="#007bff" media="(prefers-color-scheme: light)"/>
      <meta name="theme-color" content="#1a1a1a" media="(prefers-color-scheme: dark)"/>
      <meta name="title" content="Personal Fitness Application | Workout"/>
      <meta name="supported-color-schemes" content="light dark"/>

      <link rel="preload" href="../css/adminlte.css" as="style"/>
      <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/source-sans-3@5.0.12/index.css"
            integrity="sha256-tXJfXfp6Ewt1ilPzLDtQnJV4hclT9XuaZUKyUvmyr+Q=" crossorigin="anonymous" media="print"/>
      <link rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/overlayscrollbars@2.11.0/styles/overlayscrollbars.min.css"
            crossorigin="anonymous"/>
      <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
            crossorigin="anonymous"/>
      <link rel="stylesheet" href="../css/adminlte.css"/>
      <link rel="stylesheet" href="../css/style.css"/>

</head>

<body class="layout-fixed sidebar-expand-lg bg-body-tertiary" style="opacity: 0; transition: opacity 0.3s ease-in-out;">

<div class="app-wrapper">
      <div id="header-container"></div>
      <div id="sidebar-container"></div>
      <div id="toast-container-placeholder"></div>

      <main class="app-main">
            <div class="app-content-header">
                  <div class="container-fluid">
                        <div class="card mb-4 shadow-sm" id="workout-list-card" style="border-radius: 12px 12px 12px 12px;">

                              <!-- Header -->
                              <div class="card-header d-flex align-items-center"
                                   style="background: linear-gradient(90deg,#4e73df,#224abe); color: white; border-radius: 12px 12px 0 0;">

                                    <h3 class="card-title mb-0 fw-bold">Workout</h3>

                                    <div class="card-tools d-flex align-items-center gap-2 ms-auto">

                                          <!-- Search Box -->
                                          <div class="input-group input-group-sm" style="width: 200px;">
                                                <input type="text"
                                                        id="table-search"
                                                        class="form-control shadow-none"
                                                        placeholder="Search workout..."
                                                        style="border-radius: 20px;">
                                          </div>

                                          <!-- Refresh Button -->
                                          <button type="button"
                                                  class="btn btn-outline-light btn-sm shadow-sm"
                                                  onclick="loadWorkouts()"
                                                  style="border-radius: 20px;">
                                                <i class="bi bi-arrow-clockwise"></i>
                                          </button>

                                          <!-- Add Button -->
                                          <button type="button"
                                                  class="btn btn-success btn-sm px-3 shadow-sm"
                                                  style="border-radius: 20px; font-weight: 500;"
                                                  onclick="showForm(true)">
                                                <i class="bi bi-plus-lg me-1"></i>
                                                Add Workout
                                          </button>

                                    </div>
                              </div>

                              <!-- Table -->
                              <div class="card-body p-0">
                                    <table class="table table-hover align-middle mb-0">
                                          <thead style="background-color:#f8f9fc;">
                                          <tr>
                                                <th>Exercise Name</th>
                                                <th>Type</th>
                                                <th>Duration</th>
                                                <th>Intensity</th>
                                                <th>Calories Burned</th>
                                                <th>Date</th>
                                                <th>Status</th>
                                                <th class="text-center">Action</th>
                                          </tr>
                                          </thead>
                                          <tbody id="workout-table-body"></tbody>
                                    </table>
                              </div>

                              <div class="card-footer bg-white border-0 py-3">
                                    <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">

                                          <!-- Page Info -->
                                          <small class="text-muted fw-semibold">
                                                Page <span id="page-info"></span>
                                          </small>

                                          <!-- Pagination -->
                                          <nav>
                                                <ul class="pagination pagination-sm mb-0" id="pagination"></ul>
                                          </nav>

                                    </div>
                              </div>
                        </div>


                        <div class="card mb-4" id="workout-form-card" style="display: none;border-radius: 12px;">
                              <div class="card-header" style="background: linear-gradient(90deg,#4e73df,#224abe);color: white; border-radius: 12px 12px 0 0">
                                    <h3 class="card-title" id="form-title">Workout Details</h3>
                                    <div class="card-tools">
                                          <button type="button" class="btn btn-tool" onclick="showList()">
                                                <i class="bi bi-x-lg"></i>
                                          </button>
                                    </div>
                              </div>
                              <div class="card-body">
                                    <form id="workout-form">
                                          <input type="hidden" id="workoutId">
                                          <div class="row">
                                                <div class="col-md-6 mb-3">
                                                      <label for="exerciseName" class="form-label">Exercise Name</label>
                                                      <input type="text" class="form-control" id="exerciseName"
                                                             required>
                                                </div>
                                                <div class="col-md-6 mb-3">
                                                      <label for="typeId" class="form-label">Type</label>
                                                      <select class="form-select" id="typeId" required></select>
                                                </div>
                                          </div>
                                          <div class="row">
                                                <div class="col-md-6 mb-3">
                                                      <label for="duration" class="form-label">Duration</label>
                                                      <div class="input-group">
                                                            <input type="number" class="form-control" id="duration"
                                                                   required>
                                                            <select class="form-select" id="durationUomId"
                                                                    style="max-width: 100px;"></select>
                                                      </div>
                                                </div>
                                                <div class="col-md-6 mb-3">
                                                      <label for="intensityId" class="form-label">Intensity</label>
                                                      <select class="form-select" id="intensityId" required></select>
                                                </div>
                                          </div>
                                          <div class="row">
                                                <div class="col-md-6 mb-3">
                                                      <label for="caloriesBurned" class="form-label">Calories
                                                            Burned</label>
                                                      <input type="number" class="form-control" id="caloriesBurned">
                                                </div>
                                                <div class="col-md-6 mb-3">
                                                      <label for="recordDateTime" class="form-label">Date</label>
                                                      <input type="datetime-local" class="form-control"
                                                             id="recordDateTime" required>
                                                </div>
                                          </div>
                                          <div class="row">
                                                <div class="col-md-6 mb-3">
                                                      <label for="status" class="form-label">Status</label>
                                                      <select class="form-select" id="status" required>
                                                            <option value="ACTIVE">ACTIVE</option>
                                                            <option value="INACTIVE">INACTIVE</option>
                                                      </select>
                                                </div>
                                                <div class="col-md-6 mb-3">
                                                      <label for="notes" class="form-label">Notes</label>
                                                      <textarea class="form-control" id="notes" rows="3"></textarea>
                                                </div>
                                          </div>
                                          <div class="d-flex justify-content-end gap-2">
                                                <button type="button" class="btn btn-outline-secondary px-4 rounded-pill"
                                                        onclick="showList()"><i class="bi bi-x-circle me-1"></i>Cancel
                                                </button>
                                                <button type="submit" class="btn btn-primary px-4 rounded-pill shadow-sm"
                                                        id="save-btn"><i class="bi bi-check-circle me-1"></i>Save
                                                </button>
                                          </div>
                                    </form>
                              </div>
                        </div>
                  </div>

            </div>
      </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/api.js"></script>
<script src="../js/storage.js"></script>
<script src="../js/common.js"></script>
<script src="../js/api.js"></script>
<script src="../js/workout.js"></script>
</body>
</html>
