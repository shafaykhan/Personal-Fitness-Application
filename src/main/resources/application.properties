# Application Configuration
spring.application.name=fitness-app
server.port=9000
server.servlet.context-path=/fitness-app

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/fitness_app_db
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=L0ck

# Logging Configuration
logging.level.root=debug
logging.file.path=./logs
logging.file.name=./logs/fitness-app-${server.port}.log
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %clr(%5p) [%thread] %clr(%logger{36}.%M:%L){cyan} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36}.%M:%L - %msg%n
logging.logback.rollingpolicy.file-name-pattern=./logs/fitness-app-${server.port}-%d{yyyy-MM-dd}.%i.log
logging.logback.rollingpolicy.max-history=0
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.total-size-cap=0
spring.output.ansi.enabled=ALWAYS

# Security Configuration
app.token.expiry.minutes=15

# AI Configuration
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.model=mistral:latest
spring.ai.ollama.chat.options.temperature=0.3
spring.ai.ollama.chat.options.num-predict=500
spring.ai.ollama.chat.options.top-p=0.9
spring.ai.ollama.chat.options.repeat-penalty=1.2
